services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: querion-postgres
    restart: unless-stopped
    env_file: .env.production
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-querion}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-querion_secret}
      POSTGRES_DB: ${POSTGRES_DB:-querion}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Đường dẫn đã được sửa để phù hợp khi compose file nằm ở thư mục gốc
      - ./infra/docker/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-querion}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: querion-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    container_name: querion-minio
    restart: unless-stopped
    env_file: .env.production
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc
    container_name: querion-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER:-minioadmin} $${MINIO_ROOT_PASSWORD:-minioadmin_secret};
      mc mb --ignore-existing local/$${MINIO_BUCKET:-querion-docs};
      echo 'Bucket created successfully';
      "
    env_file: .env.production

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: querion-api
    restart: unless-stopped
    env_file: .env.production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  worker:
    build:
      context: ./apps/worker
      dockerfile: Dockerfile
    container_name: querion-worker
    restart: unless-stopped
    env_file: .env.production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: querion-web
    restart: unless-stopped
    env_file: .env.production
    depends_on:
      - api

  nginx:
    image: nginx:alpine
    container_name: querion-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
      - api

volumes:
  postgres_data:
  redis_data:
  minio_data:
